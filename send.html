<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    background: #f0f4f8;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 24px;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,56,118,0.10);
    padding: 40px 36px 32px;
    text-align: center;
    max-width: 380px;
    width: 100%;
  }
  .logo-link {
    display: inline-block;
    text-decoration: none;
    transition: transform 0.15s ease, opacity 0.15s ease;
  }
  .logo-link:hover, .logo-link:active {
    transform: scale(0.97);
    opacity: 0.88;
  }
  .logo-link img {
    width: 240px;
    max-width: 100%;
    height: auto;
    display: block;
    margin: 0 auto;
  }
  .divider {
    width: 48px;
    height: 3px;
    background: #e1962f;
    border-radius: 2px;
    margin: 20px auto;
  }
  .label {
    font-family: 'Montserrat', 'Segoe UI', system-ui, sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: #003876;
    letter-spacing: 0.01em;
    margin-bottom: 6px;
  }
  .sublabel {
    font-size: 13px;
    color: #6b7a8d;
    line-height: 1.5;
  }
  .tap-hint {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 20px;
    background: #f0f4f8;
    border: 1.5px solid #d0dbe8;
    border-radius: 20px;
    padding: 7px 16px;
    font-size: 12px;
    color: #003876;
    font-weight: 500;
    text-decoration: none;
    transition: background 0.15s ease;
  }
  .tap-hint:hover {
    background: #e1962f;
    border-color: #e1962f;
    color: #fff;
  }
  .tap-hint svg {
    flex-shrink: 0;
  }
</style>
